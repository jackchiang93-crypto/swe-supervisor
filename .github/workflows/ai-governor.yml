name: ai-governor

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history for diff-based gates

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Run tests (QA gate)
        run: pytest -q

      - name: OpenAPI contract gate
        run: supervisor contract --spec contracts/openapi.yaml --tests tests/contract

      - name: Build provenance attestation
        run: supervisor attest --base "origin/main" --out dist/attestation.json

      - name: Upload attestation
        uses: actions/upload-artifact@v4
        with:
          name: provenance
          path: dist/attestation.json
